name: Android CI

on:
  pull_request:
    branches:
      - main
      - development
  push:
    branches:
      - development

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Unit Test And Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Required CI Secrets
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          missing=0
          for name in \
            GOOGLE_CLIENT_ID \
            GOOGLE_SERVICES_JSON
          do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is required for Android CI builds"
              missing=1
            fi
          done
          exit "$missing"

      - name: Create CI Gradle Properties
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          MYSHARE_ADMOB_APP_OPEN_AD_UNIT_ID: ${{ secrets.MYSHARE_ADMOB_APP_OPEN_AD_UNIT_ID }}
        run: |
          echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> gradle.properties
          if [[ -n "$MYSHARE_ADMOB_APP_OPEN_AD_UNIT_ID" ]]; then
            echo "MYSHARE_ADMOB_APP_OPEN_AD_UNIT_ID=$MYSHARE_ADMOB_APP_OPEN_AD_UNIT_ID" >> gradle.properties
          fi

      - name: Create Google Services Config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Unit Tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Debug Build
        run: ./gradlew :app:assembleDebug
