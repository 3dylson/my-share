name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build And Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Calculate Android Version
        id: version
        run: |
          scripts/calculate_android_release_version.sh app/build.gradle | tee version.env
          cat version.env >> "$GITHUB_OUTPUT"

      - name: Stop When No Release Commit Exists
        if: steps.version.outputs.release_needed != 'true'
        run: |
          echo "No feat/fix/perf/refactor/copy or breaking-change commits since the latest v* tag."

      - name: Validate Required Release Secrets
        if: steps.version.outputs.release_needed == 'true'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          MYSHARE_RELEASE_KEYSTORE_BASE64: ${{ secrets.MYSHARE_RELEASE_KEYSTORE_BASE64 }}
          MYSHARE_RELEASE_STORE_PASSWORD: ${{ secrets.MYSHARE_RELEASE_STORE_PASSWORD }}
          MYSHARE_RELEASE_KEY_ALIAS: ${{ secrets.MYSHARE_RELEASE_KEY_ALIAS }}
          MYSHARE_RELEASE_KEY_PASSWORD: ${{ secrets.MYSHARE_RELEASE_KEY_PASSWORD }}
        run: |
          missing=0
          for name in \
            GOOGLE_CLIENT_ID \
            MYSHARE_RELEASE_KEYSTORE_BASE64 \
            MYSHARE_RELEASE_STORE_PASSWORD \
            MYSHARE_RELEASE_KEY_ALIAS \
            MYSHARE_RELEASE_KEY_PASSWORD
          do
            if [[ -z "${!name}" ]]; then
              echo "::error::$name is required for signed Android releases"
              missing=1
            fi
          done
          exit "$missing"

      - name: Decode Release Keystore
        if: steps.version.outputs.release_needed == 'true'
        env:
          MYSHARE_RELEASE_KEYSTORE_BASE64: ${{ secrets.MYSHARE_RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/release/credentials
          echo "$MYSHARE_RELEASE_KEYSTORE_BASE64" | base64 --decode > app/release/credentials/release.keystore

      - name: Create CI Gradle Properties
        if: steps.version.outputs.release_needed == 'true'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          MYSHARE_ADMOB_APP_OPEN_AD_UNIT_ID: ${{ secrets.MYSHARE_ADMOB_APP_OPEN_AD_UNIT_ID }}
          MYSHARE_RELEASE_STORE_PASSWORD: ${{ secrets.MYSHARE_RELEASE_STORE_PASSWORD }}
          MYSHARE_RELEASE_KEY_ALIAS: ${{ secrets.MYSHARE_RELEASE_KEY_ALIAS }}
          MYSHARE_RELEASE_KEY_PASSWORD: ${{ secrets.MYSHARE_RELEASE_KEY_PASSWORD }}
        run: |
          {
            echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"
            echo "MYSHARE_ADMOB_APP_OPEN_AD_UNIT_ID=$MYSHARE_ADMOB_APP_OPEN_AD_UNIT_ID"
            echo "MYSHARE_RELEASE_STORE_FILE=${{ github.workspace }}/app/release/credentials/release.keystore"
            echo "MYSHARE_RELEASE_STORE_PASSWORD=$MYSHARE_RELEASE_STORE_PASSWORD"
            echo "MYSHARE_RELEASE_KEY_ALIAS=$MYSHARE_RELEASE_KEY_ALIAS"
            echo "MYSHARE_RELEASE_KEY_PASSWORD=$MYSHARE_RELEASE_KEY_PASSWORD"
          } >> gradle.properties

      - name: Apply Android Version
        if: steps.version.outputs.release_needed == 'true'
        run: |
          scripts/update_android_gradle_version.sh \
            app/build.gradle \
            "${{ steps.version.outputs.next_version_name }}" \
            "${{ steps.version.outputs.next_version_code }}"

      - name: Generate Release Notes
        if: steps.version.outputs.release_needed == 'true'
        run: |
          if [[ -n "${{ steps.version.outputs.last_tag }}" ]]; then
            git log --pretty='- %s' "${{ steps.version.outputs.last_tag }}..HEAD" > RELEASE_NOTES.md
          else
            git log --pretty='- %s' > RELEASE_NOTES.md
          fi

      - name: Unit Tests
        if: steps.version.outputs.release_needed == 'true'
        run: ./gradlew :app:testDebugUnitTest

      - name: Build Release APK And Bundle
        if: steps.version.outputs.release_needed == 'true'
        run: ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Commit Version Bump
        if: steps.version.outputs.release_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle
          git commit -m "chore(release): ${{ steps.version.outputs.tag_name }}"
          git tag "${{ steps.version.outputs.tag_name }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag_name }}"

      - name: Create GitHub Release
        if: steps.version.outputs.release_needed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: My Share ${{ steps.version.outputs.next_version_name }}
          body_path: RELEASE_NOTES.md
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Check Publishing Secrets
        if: steps.version.outputs.release_needed == 'true'
        id: publishing_secrets
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
        run: |
          [[ -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]] && echo "has_play=true" >> "$GITHUB_OUTPUT" || echo "has_play=false" >> "$GITHUB_OUTPUT"
          [[ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" && -n "$FIREBASE_ANDROID_APP_ID" ]] && echo "has_firebase_distribution=true" >> "$GITHUB_OUTPUT" || echo "has_firebase_distribution=false" >> "$GITHUB_OUTPUT"

      - name: Upload To Google Play
        if: steps.version.outputs.release_needed == 'true' && steps.publishing_secrets.outputs.has_play == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: pt.ms.myshare
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ vars.GOOGLE_PLAY_TRACK || 'internal' }}
          status: ${{ vars.GOOGLE_PLAY_RELEASE_STATUS || 'draft' }}
          whatsNewDirectory: docs/release/play-whats-new

      - name: Upload To Firebase App Distribution
        if: steps.version.outputs.release_needed == 'true' && steps.publishing_secrets.outputs.has_firebase_distribution == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_APP_DISTRIBUTION_GROUPS: ${{ vars.FIREBASE_APP_DISTRIBUTION_GROUPS || 'internal-testers' }}
        run: |
          npm install -g firebase-tools
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > firebase-service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS="$PWD/firebase-service-account.json"
          firebase appdistribution:distribute \
            app/build/outputs/apk/release/app-release.apk \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --groups "$FIREBASE_APP_DISTRIBUTION_GROUPS" \
            --release-notes-file RELEASE_NOTES.md
